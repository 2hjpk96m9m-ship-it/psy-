    {t:"理想的周日早晨？", o:["被窝听雨","空美术馆","忙碌早市","远足路上","咖啡馆"], s:[[9,7,8,10,9,10,5,10],[10,5,10,8,3,6,8,1],[6,8,7,9,7,7,6,8],[7,9,6,9,10,8,7,9],[8,10,9,7,8,9,9,7]]},
    {t:"更愿意被定义为？", o:["唯一","纯粹","复杂","容器","利剑"], s:[[10,10,9,9,6,8,10,5],[5,8,7,10,10,9,2,10],[9,9,10,8,4,7,9,4],[7,7,6,10,9,8,5,9],[8,6,8,7,4,6,10,6]]},
    {t:"对于“失去”？", o:["坦然接受","极力挽回","瞬间冷漠","反思自我","美化朱砂"], s:[[10,8,10,9,6,7,8,5],[4,6,3,8,10,9,1,9],[9,4,9,7,3,6,10,2],[8,7,8,8,7,8,6,7],[7,9,7,10,8,10,9,8]]},
    {t:"电影世界角色？", o:["迷人反派","幕后操盘","纯真主角","冷眼路人","夕阳背影"], s:[[9,10,9,8,5,7,10,4],[10,8,10,7,4,6,9,6],[5,7,4,10,10,9,2,10],[10,3,8,9,6,5,7,1],[9,6,10,8,7,8,8,5]]},
    {t:"向世界告别？", o:["落叶静默","烟火热烈","谜题","众人怀念","奔向虚无"], s:[[10,4,10,9,6,6,5,2],[5,10,6,10,10,10,9,9],[9,9,9,8,5,9,10,5],[4,8,4,10,9,9,3,10],[10,7,10,7,4,7,10,4]]}
];

let curr = 0; let uA = new Array(32).fill(null);
const $ = id => document.getElementById(id);

function go() { $('cover').classList.remove('active'); $('quiz').classList.add('active'); show(); }

function show() {
    const q = qs[curr];
    $('p-idx').innerText = `${String(curr+1).padStart(2,'0')} / 32`;
    $('fill').style.width = ((curr+1)/32*100) + '%';
    $('q-t').innerText = q.t;
    $('opts').innerHTML = '';
    q.o.forEach((txt, i) => {
        const d = document.createElement('div');
        d.className = `opt ${uA[curr]===i?'sel':''}`;
        d.innerHTML = txt;
        d.onclick = () => { uA[curr]=i; show(); setTimeout(next, 200); };
        $('opts').appendChild(d);
    });
}

function prev() { if(curr > 0) { curr--; show(); } }
function next() { 
    if(uA[curr]===null) return;
    if(curr < 31) { curr++; show(); } else { finish(); }
}

function finish() {
    $('quiz').classList.remove('active'); $('result').classList.add('active');
    let dSc = [0,0,0,0,0,0,0,0];
    uA.forEach((a, i) => { qs[i].s[a].forEach((v, d) => dSc[d] += v); });

    // 计算总分：线性映射 + 随机微调 (确保范围50-100)
    let totalAvg = dSc.reduce((a,b)=>a+b, 0) / 8; // 32题的总平均权值
    let final = Math.round((totalAvg / 320) * 50 + 48 + (Math.random()*4));
    final = Math.max(50, Math.min(100, final));
    
    $('total-val').innerText = final;
    const lvN = ["极简潜行者","博弈均衡派","磁场掌控者","高维灵魂捕手","极境引力场"];
    $('level-tag').innerText = lvN[Math.floor((final-50)/10.1)] || lvN[4];

    const dN = ["颜值气质场","核心吸引逻辑","初见心理落差","性格深度图谱","潜在异性缘","亲和力与厚度","致命审美点","高维匹配建议"];
    
    // 维度解析：精准判定 (130, 165, 200, 240)
    $('res-list').innerHTML = dSc.map((s, i) => {
        let l = 0;
        if(s < 140) l = 0;
        else if(s < 185) l = 1;
        else if(s < 235) l = 2;
        else if(s < 275) l = 3;
        else l = 4;
        
        return `<div class="res-card">
                    <div class="res-title">${dN[i]}</div>
                    <div class="res-desc">${LIB[i][l]}</div>
                </div>`;
    }).join('');
}
</script>
