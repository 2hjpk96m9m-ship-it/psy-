function loadQ() {
    const q = questions[cur];
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('progress-fill').style.width = ((cur+1)/questions.length*100)+'%';
    document.getElementById('progress-num').innerText = `${cur+1} / ${questions.length}`;
    const box = document.getElementById('options-box');
    box.innerHTML = '';
    q.options.forEach((o, i) => {
        const b = document.createElement('button');
        b.className = 'option-btn' + (userAns[cur] === i ? ' selected' : ''); // 加强视觉：选中态
        b.innerText = o.t;
        b.onclick = () => { selectOpt(i); };
        box.appendChild(b);
    });
    document.getElementById('prev-btn').style.visibility = cur===0?'hidden':'visible';
}

function selectOpt(idx) {
    userAns[cur] = idx;
    if(cur < questions.length - 1){
        cur++;
        setTimeout(loadQ, 200); // 100ms 延迟，增加点击仪式感
    }else{
        setTimeout(showRes, 200);
    }
}

function prevQuestion(){ if(cur>0){ cur--; loadQ(); } }
