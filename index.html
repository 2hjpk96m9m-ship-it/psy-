<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵魂引力场 | 异性吸引力深度测评</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #7a67ee; --secondary: #a29bfe; --bg: #fdfbff; --text: #333; --card-bg: rgba(255,255,255,0.92); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
               background: linear-gradient(135deg, #f5f7fa 0%,#c3cfe2 100%); color: var(--text);
               display: flex; justify-content: center; min-height: 100vh; }
        #container { width: 100%; max-width: 500px; padding: 20px; margin-top: 20px; }

        /* 封面 */
        #cover-section { display: flex; flex-direction: column; align-items: center;
                         justify-content: center; min-height: 80vh; text-align: center; }
        .cover-title { font-size: 32px; color: var(--primary); margin-bottom: 10px; letter-spacing: 2px; }
        .cover-subtitle { font-size: 16px; color: #666; margin-bottom: 40px; }
        .cover-btn { padding: 15px 40px; background: var(--primary); color: #fff; border: none;
                     border-radius: 30px; font-size: 18px; cursor: pointer; transition: .3s; }
        .cover-btn:hover { background: #6a56d6; transform: scale(1.03); }

        /* 加载 */
        .loading { display: flex; flex-direction: column; align-items: center;
                   justify-content: center; min-height: 60vh; }
        .loading-bar { width: 200px; height: 4px; background: #eee; border-radius: 2px;
                       overflow: hidden; margin-bottom: 15px; }
        .loading-bar-inner { height: 100%; background: var(--primary); width: 20%;
                             animation: loading 1.5s infinite; }
        @keyframes loading { 0%{transform:translateX(-100%);} 100%{transform:translateX(300%);} }

        /* 答题卡 */
        .card { background: var(--card-bg); padding: 25px; border-radius: 24px;
                box-shadow: 0 15px 35px rgba(0,0,0,0.07); backdrop-filter: blur(10px);
                border: 1px solid rgba(255,255,255,0.3); min-height: 80vh;
                display: flex; flex-direction: column; justify-content: center; }
        .progress-bar { width: 100%; height: 6px; background: #eee; border-radius: 3px;
                        margin-bottom: 20px; overflow: hidden; }
        #progress-inner { height: 100%; background: var(--primary); width: 5%; transition: width .3s ease; }
        .question-text { font-size: 18px; line-height: 1.5; margin-bottom: 25px; font-weight: 600; }
        .option-btn { display: block; width: 100%; padding: 14px 20px; margin-bottom: 12px;
                      border: 2px solid #f0f0f0; border-radius: 14px; background: #fff; cursor: pointer;
                      font-size: 15px; text-align: left; transition: .2s; color: var(--text); }
        .option-btn:hover { border-color: var(--primary); background: #f8f7ff; transform: translateX(3px); }
        .option-btn.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 20px; }
        .nav-btn { padding: 10px 20px; border: 1px solid var(--primary); border-radius: 20px;
                   background: #fff; color: var(--primary); cursor: pointer; transition: .2s; }
        .nav-btn:disabled { opacity: .5; cursor: not-allowed; }
        .nav-btn:hover:not(:disabled) { background: var(--primary); color: #fff; }

        /* 结果 */
        #result-section { display: none; }
        .result-title { font-size: 22px; margin-bottom: 10px; color: var(--primary); text-align: center; }
        .tag { display: inline-block; padding: 4px 12px; background: var(--primary); color: #fff;
               border-radius: 20px; font-size: 14px; margin-bottom: 15px; }
        .radar-box { margin: 20px 0; background: #fff; padding: 10px; border-radius: 15px; }
        .analysis-card { background: #f8f9ff; padding: 20px; border-radius: 15px;
                         font-size: 15px; line-height: 1.8; margin-bottom: 15px; }
        .dimension-detail { background: #fff; padding: 15px; border-radius: 12px;
                            margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .dimension-title { font-weight: 600; color: var(--primary); margin-bottom: 5px; }
    </style>
</head>

let currentIdx = 0;
let answers = Array(questions.length).fill(null);
let totalScores = [0,0,0,0,0,0,0,0];
const dimensionNames = [
    "外在气质呈现",
    "综合吸引力",
    "第一印象得分",
    "性格魅力指数",
    "异性缘表现",
    "恋爱适配度",
    "致命吸引力",
    "灵魂契合类型"
];

function startQuiz(){
    document.getElementById('cover-section').style.display='none';
    document.getElementById('loading-section').style.display='flex';
    setTimeout(()=>{
        document.getElementById('loading-section').style.display='none';
        document.getElementById('quiz-section').style.display='flex';
        loadQuestion();
    },1400);
}

function loadQuestion(){
    const q=questions[currentIdx];
    document.getElementById('q-text').innerText=q.q;
    document.getElementById('progress-inner').style.width=((currentIdx+1)/questions.length*100)+'%';
    const box=document.getElementById('options-box'); box.innerHTML='';
    q.options.forEach((opt,idx)=>{
        const b=document.createElement('button');
        b.className='option-btn'+(answers[currentIdx]===idx?' selected':'');
        b.innerText=opt.text;
        b.onclick=()=>{ answers[currentIdx]=idx; loadQuestion(); };
        box.appendChild(b);
    });
    document.getElementById('prev-btn').disabled=currentIdx===0;
    document.getElementById('next-btn').innerText=currentIdx===questions.length-1?'查看结果':'下一题';
}

function prevQuestion(){ if(currentIdx>0){ currentIdx--; loadQuestion(); } }
function nextQuestion(){
    if(answers[currentIdx]===null){ alert('请先选择一个选项哦~'); return; }
    if(currentIdx<questions.length-1){ currentIdx++; loadQuestion(); } else { calc(); showResult(); }
}

function calc(){
    totalScores=[0,0,0,0,0,0,0,0];
    for(let i=0;i<questions.length;i++){
        const opt=questions[i].options[answers[i]];
        for(let d=0;d<8;d++) totalScores[d]+=opt.score[d];
    }
}

function showResult(){
    document.getElementById('quiz-section').style.display='none';
    document.getElementById('result-section').style.display='block';
    const final=totalScores.map(s=>{
        let p=Math.round((s/120)*100);
        return Math.max(50,Math.min(100,p));
    });
    const avg=Math.round(final.reduce((a,b)=>a+b,0)/8);
    new Chart(document.getElementById('radarChart').getContext('2d'),{
        type:'radar', data:{ labels:dimensionNames, datasets:[{
            label:'引力值', data:final, backgroundColor:'rgba(122,103,238,0.2)',
            borderColor:'rgba(122,103,238,1)', borderWidth:2, pointBackgroundColor:'rgba(122,103,238,1)'
        }]}, options:{ scales:{r:{beginAtZero:true,max:100,ticks:{display:false}}}, plugins:{legend:{display:false}}}
    });
    let title,analysis;
    const mx=Math.max(...final),mi=final.indexOf(mx);
    if(mi===0||mi===2){ title="清冷系·高岭之花";
        analysis="因为你在选择中更偏向内敛、独立与克制，性格里自带疏离与高级感，所以你在异性眼中安静又有距离，这种清冷气质让你显得神秘又耐看，容易吸引成熟、稳重、有内涵的人。";
